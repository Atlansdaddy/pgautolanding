name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `turbo --affected` can diff against the base

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # 22.22.3 — matches the Volta pin locally
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint · typecheck · test · build (affected)
        run: pnpm exec turbo run lint typecheck test build --affected
